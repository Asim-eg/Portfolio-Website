<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Asim Altaf Resume | Backend Systems Engineer</title>
    <meta
      name="description"
      content="Resume of Asim Altaf, a backend systems engineer focused on C/C++, Go, telecom platforms, 5G core, eSIM, and real-time systems."
    />
    <meta name="author" content="Asim Altaf" />
    <meta property="og:title" content="Asim Altaf Resume | Backend Systems Engineer" />
    <meta
      property="og:description"
      content="Backend systems engineer resume covering telecom platforms, C/C++, Go, 5G core, eSIM, SS7/MAP, and real-time systems."
    />
    <meta property="og:type" content="profile" />
    <meta name="theme-color" content="#0a0b0f" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #07080b;
        --panel: rgba(18, 20, 24, 0.92);
        --line: rgba(255, 214, 122, 0.28);
        --text: #f6f7fb;
        --muted: #a9adb6;
        --gold: #ffd66f;
        --red: #ff3d2e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 18% 8%, rgba(255, 61, 46, 0.2), transparent 28rem),
          radial-gradient(circle at 82% 0%, rgba(255, 214, 111, 0.14), transparent 30rem),
          var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        display: grid;
        gap: 18px;
        min-height: 100vh;
        padding: clamp(16px, 3vw, 36px);
        grid-template-rows: auto 1fr;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        width: min(1180px, 100%);
        margin: 0 auto;
        padding: 14px 16px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: var(--panel);
        box-shadow: 0 22px 70px rgba(0, 0, 0, 0.34);
        backdrop-filter: blur(18px);
      }

      h1 {
        margin: 0;
        font-size: clamp(1.05rem, 2vw, 1.45rem);
        line-height: 1.1;
      }

      p {
        margin: 5px 0 0;
        color: var(--muted);
        font-size: 0.92rem;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: flex-end;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        padding: 0 16px;
        border: 1px solid rgba(255, 214, 122, 0.36);
        border-radius: 999px;
        color: var(--text);
        text-decoration: none;
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        background:
          linear-gradient(110deg, rgba(255, 214, 122, 0.13), rgba(255, 61, 46, 0.08)),
          rgba(255, 255, 255, 0.04);
        transition:
          border-color 160ms ease,
          box-shadow 160ms ease,
          transform 160ms ease;
      }

      a:hover,
      a:focus-visible {
        border-color: rgba(255, 214, 122, 0.82);
        box-shadow:
          0 0 22px rgba(255, 214, 122, 0.16),
          0 0 30px rgba(255, 61, 46, 0.12);
        transform: translateY(-1px);
      }

      .viewer {
        overflow: hidden;
        width: min(1180px, 100%);
        min-height: 72vh;
        margin: 0 auto;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: #111318;
        box-shadow: 0 28px 90px rgba(0, 0, 0, 0.42);
      }

      iframe {
        display: block;
        width: 100%;
        min-height: min(1120px, calc(100vh - 150px));
        border: 0;
        background: #1b1d22;
      }

      @media (max-width: 720px) {
        header {
          align-items: flex-start;
          flex-direction: column;
        }

        .actions {
          justify-content: flex-start;
          width: 100%;
        }

        a {
          flex: 1 1 150px;
        }

        iframe {
          min-height: calc(100vh - 220px);
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>Asim Altaf Resume</h1>
          <p>Asim Altaf - Backend Systems Engineer</p>
        </div>
        <div class="actions" aria-label="Resume actions">
          <a href="/Asim_Altaf_Resume.pdf" target="_blank" rel="noreferrer">Open PDF</a>
          <a href="/Asim_Altaf_Resume.pdf" download="Asim_Altaf_Resume.pdf">Download PDF</a>
        </div>
      </header>
      <section class="viewer" aria-label="Asim Altaf resume PDF">
        <iframe src="/Asim_Altaf_Resume.pdf#toolbar=1&navpanes=0" title="Asim Altaf resume PDF">
          <a href="/Asim_Altaf_Resume.pdf">Open Asim Altaf's resume PDF</a>
        </iframe>
      </section>
    </main>
  </body>
</html>
